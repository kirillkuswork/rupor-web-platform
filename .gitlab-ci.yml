trivy-image:
  stage: sca-image
  image:
    name: ${DEVSECOPS_REPO}/trivy
    entrypoint: [""]
  variables:
    DD_SCAN_TYPE: "Trivy Scan"
    DD_TEST_NAME: "Trivy image scan"
    REPORT_FILE: "vuln-reports/vuln_Trivy-image_$CI_PROJECT_NAME-$CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA.json"
    META_FILE: "vuln-reports/vuln_Trivy-image_$CI_PROJECT_NAME-$CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA.meta"
  tags:
    - md2
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  needs:
    - build-test
  allow_failure: true
  before_script:
    - mkdir -p vuln-reports
    - printf "DD_SCAN_TYPE=\"$DD_SCAN_TYPE\"\nDD_TEST_NAME=\"$DD_TEST_NAME\"" > $META_FILE
  script:
    - trivy --version
    - trivy image --skip-db-update --username $DOCKER_REGISTRY_USER --password $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY/$CI_PROJECT_NAME:$IMAGE_TAG-test -f json -o "$REPORT_FILE"
  artifacts:
    when: always
    paths:
      - $REPORT_FILE
      - $META_FILE
    expire_in: 1 day

defectdojo-push:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

deploy-dev:
  stage: deploy
  image: registry-cbrom.rutube.ru/repository/cbrom-docker/devops/helm:latest
  needs:
    - build-dev
  tags:
    - md2
  variables:
    ENVIRONMENT: dev
  environment:
    name: $PROJECT_ID-$ENVIRONMENT
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH
      when: manual
  script:
    - cd .cicd/k8s
    - export KUBECONFIG=${KUBECONFIG}
    - chmod 600 /builds/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME.tmp/KUBECONFIG
    - helm upgrade --install -n rupor-dev $CI_PROJECT_NAME .
      --set image.repository="registry-cbrom.rutube.ru/repository/cbrom-docker/rupor/$CI_PROJECT_NAME"
      --set image.tag="$IMAGE_TAG-dev"
      --set imagePullSecrets[0].name="ruform-rupor"
      --set ingress.hosts[0].host="web-platform.rupor-dev.rutube.dev"
      --set ingress.hosts[0].paths[0].path="/"
      --set ingress.hosts[0].paths[0].pathType="ImplementationSpecific"
      --set resources.requests.cpu="100m"
      --set resources.requests.memory="100Mi"
      --set resources.limits.cpu="3"
      --set resources.limits.memory="2048Mi"
      --set env.VERSION="$CI_COMMIT_REF_NAME"

deploy-test:
  stage: deploy
  image: registry-cbrom.rutube.ru/repository/cbrom-docker/devops/helm:latest
  needs:
    - build-test
  tags:
    - md2
  variables:
    ENVIRONMENT: test
  environment:
    name: $PROJECT_ID-$ENVIRONMENT
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH
      when: manual
  script:
    - cd .cicd/k8s
    - export KUBECONFIG=${KUBECONFIG}
    - chmod 600 /builds/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME.tmp/KUBECONFIG
    - helm upgrade --install -n rupor-test $CI_PROJECT_NAME .
      --set image.repository="registry-cbrom.rutube.ru/repository/cbrom-docker/rupor/$CI_PROJECT_NAME"
      --set image.tag="$IMAGE_TAG-test"
      --set imagePullSecrets[0].name="ruform-rupor"
      --set ingress.hosts[0].host="web-platform.rupor-test.rutube.dev"
      --set ingress.hosts[0].paths[0].path="/"
      --set ingress.hosts[0].paths[0].pathType="ImplementationSpecific"
      --set resources.requests.cpu="100m"
      --set resources.requests.memory="100Mi"
      --set resources.limits.cpu="3"
      --set resources.limits.memory="2048Mi"
      --set env.VERSION="$CI_COMMIT_REF_NAME"
  after_script:
    - export SVC_VERSION=$(git tag --points-at $CI_COMMIT_SHA | grep "$CI_COMMIT_BRANCH")
    - if [[ -z $SVC_VERSION ]]; then export SVC_VERSION="$CI_COMMIT_BRANCH"; fi
    - JOB_RES=$([ "$CI_JOB_STATUS" == "success" ] && echo "🟢success🟢" || echo "🔴failed🔴")
    - |
      VKT_DEPLOY_MESSAGE=$(cat << EOF
      ⚠ На <b>$ENVIRONMENT</b> запущено обновление сервиса <b>$CI_PROJECT_NAME</b> пользователем <b>$GITLAB_USER_NAME</b>
      Версия: $SVC_VERSION
      Commit: $CI_COMMIT_SHA
      Job: $CI_JOB_URL
      Результат: $JOB_RES
      Список версий по всем стендам для $CI_PROJECT_NAME: https://api.rupor-dev.rutube.dev/svcversions/json/diff?svcname=$CI_PROJECT_NAME
      EOF
      )
    - curl --data-urlencode "text=$VKT_DEPLOY_MESSAGE" "https://api.gpmteams.ru/bot/v1/messages/sendText?chatId=$VKT_CHAT_ID&parseMode=HTML&token=$VKT_BOT_TOKEN"

