include:
  - project: 'cyber-rom/rupor/common-pipeline'
    ref: main
    file: 'sca-sast/defectdojo-push.yml'

image: registry-cbrom.rutube.ru/repository/cbrom-docker/devops/docker:20.10.24-cyrm

stages:
  - sast
  - sca
  - build
  - sca-image
  - report-push
  - deploy

variables:
  GIT_STRATEGY: clone
  IMAGE_TAG: $CI_COMMIT_SHA
  PROJECT_ID: rupor

trivy-repo:
  stage: sca
  image:
    name: ${DEVSECOPS_REPO}/trivy
    entrypoint: [""]
  variables:
    DD_SCAN_TYPE: "Trivy Scan"
    DD_TEST_NAME: "Trivy repository scan"
    REPORT_FILE: "vuln-reports/vuln_Trivy-repo_$CI_PROJECT_NAME-$CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA.json"
    META_FILE: "vuln-reports/vuln_Trivy-repo_$CI_PROJECT_NAME-$CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA.meta"
  tags:
    - md2
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true
  before_script:
    - mkdir -p vuln-reports
    - printf "DD_SCAN_TYPE=\"$DD_SCAN_TYPE\"\nDD_TEST_NAME=\"$DD_TEST_NAME\"" > $META_FILE
  script:
    - trivy --version
    - trivy repo --skip-db-update --branch $CI_COMMIT_REF_NAME $CI_REPOSITORY_URL -f json -o "$REPORT_FILE"
  artifacts:
    when: always
    paths:
      - $REPORT_FILE
      - $META_FILE
    expire_in: 1 day

.build-image:
  stage: build
  services:
    - registry-cbrom.rutube.ru/repository/cbrom-docker/devops/docker:20.10.24-dind
  tags:
    - md2
  before_script:
    - |
      for i in $(seq 1 60); do
          if ! docker info &> /dev/null; then
              echo "Docker not responding yet. Sleeping for 2s..." && sleep 2s
          else
              echo "Docker ready. Continuing build..."
              break
          fi
      done
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASSWORD" $DOCKER_REGISTRY
    - echo "always-auth=true" >> .npmrc
    - echo "//registry.rutube.ru/repository/cbrom-npm-group/:_auth=${NEXUS_NPM_GROUP_TOKEN}"  >> .npmrc

build-dev:
  extends: .build-image
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH
      when: always
  script:
    - echo ${HTTP_PROXY}
    - echo ${HTTPS_PROXY}
    - echo ${NO_PROXY}
    - docker build
      --build-arg NEXT_PUBLIC_NODE_ENV=production
      --build-arg NEXT_PUBLIC_API_URL=https://api.rupor-dev.rutube.dev
      --build-arg NEXT_PUBLIC_IMG_PROXY_KEY=943b421c9eb07c830af81030552c86009268de4e532ba2ee2eab8247c6da0881
      --build-arg NEXT_PUBLIC_IMG_PROXY_SALT=520f986b998545b4785e0defbc4f3c1203f22de2374a3d53cb7a7fe9fea309c5
      --build-arg NEXT_PUBLIC_IMG_PROXY_URL=https://imgproxy.rupor-dev.rutube.dev
      --build-arg NEXT_PUBLIC_API_COOKIE_DOMAIN=.rupor-dev.rutube.dev
      --build-arg I18_LANGUAGE_FOLDER=./public/locales
      --build-arg NEXT_PUBLIC_AUTH_MODE_TYPE=2
      --build-arg NEXT_PUBLIC_STUDIO_URL=https://web-studio.rupor-dev.rutube.dev
      --build-arg NEXT_PUBLIC_VERSION_ID=2
      --build-arg NEXT_PUBLIC_LOCALIZE_URL=https://api.rupor-dev.rutube.dev/localize-app/v1
      --build-arg NEXT_PUBLIC_METRICS_API_URL=https://metrics.rupor-dev.rutube.dev
      --pull -t $DOCKER_REGISTRY/$CI_PROJECT_NAME:$IMAGE_TAG-dev .
    - docker push $DOCKER_REGISTRY/$CI_PROJECT_NAME:$IMAGE_TAG-dev

